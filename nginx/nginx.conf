worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 25M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;

    upstream frontend_upstream {
        server frontend:3000;
    }

    upstream backend_upstream {
        server backend:8000;
    }

    # ------------------------------------------------------------------
    # HTTP :80 — ACME challenge + redirect everything else to HTTPS
    # ------------------------------------------------------------------
    server {
        listen 80;
        server_name ltltv.com www.ltltv.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ------------------------------------------------------------------
    # HTTPS :443 — main site
    # ------------------------------------------------------------------
    server {
        listen 443 ssl;
        http2 on;
        server_name ltltv.com www.ltltv.com;

        ssl_certificate     /etc/letsencrypt/live/ltltv.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/ltltv.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;

        # -------------------------------------------------------------
        # Django admin
        # -------------------------------------------------------------
        location /admin/ {
            proxy_pass         http://backend_upstream;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # -------------------------------------------------------------
        # Django REST API
        # -------------------------------------------------------------
        location /api/ {
            proxy_pass         http://backend_upstream;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # -------------------------------------------------------------
        # Django static & media files
        # -------------------------------------------------------------
        location /static/ {
            alias /app/staticfiles/;
            access_log off;
            expires 30d;
        }

        location /media/ {
            alias /app/media/;
            access_log off;
            expires 30d;
        }

        # -------------------------------------------------------------
        # Next.js frontend (default)
        # -------------------------------------------------------------
        location / {
            proxy_pass         http://frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
