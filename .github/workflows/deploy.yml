name: CI / CD — ltltv

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # 1. Backend — install deps, run Django checks & tests
  # ---------------------------------------------------------------------------
  backend:
    name: Backend (Django)
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: ltltv
          POSTGRES_USER: ltltv
          POSTGRES_PASSWORD: ltltv
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U ltltv"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: ['6379:6379']

    env:
      SECRET_KEY: ci-secret
      DEBUG: 'False'
      ALLOWED_HOSTS: 'localhost,127.0.0.1'
      DATABASE_URL: postgres://ltltv:ltltv@localhost:5432/ltltv
      REDIS_URL: redis://localhost:6379/0

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Django system checks
        run: python manage.py check

      - name: Run tests
        run: python manage.py test --noinput

  # ---------------------------------------------------------------------------
  # 2. Frontend — install deps, lint & build
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint --if-present

      - name: Build
        run: npm run build

  # ---------------------------------------------------------------------------
  # 3. Deploy — SSH into the Hostinger VPS and pull + rebuild
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-22.04
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            cd /opt/ltltv
            git pull origin main
            docker compose pull || true
            docker compose build
            docker compose up -d
            docker compose exec -T backend python manage.py migrate --noinput
            docker compose exec -T backend python manage.py collectstatic --noinput
            docker image prune -f
